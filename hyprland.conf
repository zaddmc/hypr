# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

# Lock screen 
exec-once = hyprlock --no-fade-in -c ~/.config/hypr/hyprlock_greet.conf

# Lock screen when closing lid
bindl = , switch:off:Lid Switch, exec, hyprlock

################
### MONITORS ###
################
# See https://wiki.hyprland.org/Configuring/Monitors/
monitor = eDP-1, preferred, auto, 1
monitor = HDMI-A-1, 1920x1080@30, auto, 1, mirror, eDP-1
#monitor = HDMI-A-1, 3840x2160@30, auto, 1, mirror, eDP-1

workspace = name:external, monitor:HDMI-A-1, default:true
windowrule = border_color rgba(FF00BFFF), match:workspace name:external
bind = SUPER, e, workspace, name:external
bind = SUPER SHIFT, e, movetoworkspacesilent, name:external

bind = SUPER, p, submap, projection
submap = projection

bind = , m, exec, hyprctl keyword monitor "HDMI-A-1, 1920x1080@30, auto, 1, mirror, eDP-1"
bind = , m, submap, reset
bind = , s, exec, hyprctl keyword monitor "HDMI-A-1, 1920x1080@30, auto, 1"
bind = , s, submap, reset
bind = , w, exec, ffplay -nodisp -volume 15 "/home/zadd/Stuff/10 Hours of calming sounds to keep you awake.mp3"
bind = , w, submap, reset
bind = , escape, submap, reset

submap = reset

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$terminal = kitty


#################
### AUTOSTART ###
#################

exec-once = waybar
# exec-once = hyprpaper
exec-once = walker --gapplication-service
exec-once = [workspace 1 silent] zen-browser


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,2
env = HYPRCURSOR_SIZE,2
env = WORK_LAYER, 1


###################
### PERMISSIONS ###
###################

# See https://wiki.hyprland.org/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
